version: '3.8'

services:
  # Base de données de Production
  db-prod:
    image: postgres:15
    container_name: vdf-db-prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER_PROD}
      POSTGRES_PASSWORD: ${DB_PASSWORD_PROD}
      POSTGRES_DB: ambulance_db_prod
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - vdf-network-prod

  # Application Next.js de Production
  app-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vdf-app-prod
    restart: always
    ports:
      # Change 3000 mapping based on your reverse proxy needs. Example: 3000:3000
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${DB_USER_PROD}:${DB_PASSWORD_PROD}@db-prod:5432/ambulance_db_prod
      AUTH_SECRET: ${AUTH_SECRET_PROD}
      NEXTAUTH_URL: https://app.vdf-ambulance.fr
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST}
      EMAIL_SERVER_HOST: ${EMAIL_SERVER_HOST}
      EMAIL_SERVER_PORT: ${EMAIL_SERVER_PORT}
      EMAIL_SERVER_USER: ${EMAIL_SERVER_USER}
      EMAIL_SERVER_PASSWORD: ${EMAIL_SERVER_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_ADMIN_NOTIFY: ${EMAIL_ADMIN_NOTIFY}
      RH_ADMIN_EMAIL: ${RH_ADMIN_EMAIL}
      RH_ADMIN_PASSWORD: ${RH_ADMIN_PASSWORD}
    depends_on:
      - db-prod
    networks:
      - vdf-network-prod

  # Evolution API (WhatsApp Alternative)
  evolution-api:
    image: atendai/evolution-api:v2.1.1
    container_name: vdf-evolution-api-prod
    restart: always
    ports:
      - "8081:8080" # Change if needed on prod
    environment:
      - SERVER_URL=http://localhost:8081
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${AUTH_SECRET_PROD:-vdf_securite_api_2024}
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${DB_USER_PROD}:${DB_PASSWORD_PROD}@db-prod:5432/ambulance_db_prod?schema=evolution
      - CACHE_REDIS_ENABLED=false
      - CACHE_LOCAL_ENABLED=true
    volumes:
      - evolution_instances_prod:/evolution/instances
      - evolution_store_prod:/evolution/store
    depends_on:
      - db-prod
    networks:
      - vdf-network-prod

networks:
  vdf-network-prod:
    driver: bridge

volumes:
  postgres_data_prod:
  evolution_instances_prod:
  evolution_store_prod:
