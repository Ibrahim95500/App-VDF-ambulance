version: '3.8'

services:
  # Base de données de Développement
  db-dev:
    image: postgres:15
    container_name: vdf-db-dev
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER_DEV}
      POSTGRES_PASSWORD: ${DB_PASSWORD_DEV}
      POSTGRES_DB: ambulance_app_db
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - vdf-network-dev

  # Application Next.js de Développement
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vdf-app-dev
    restart: always
    ports:
      - "8080:3000"
    environment:
      TZ: Europe/Paris
      DATABASE_URL: postgresql://${DB_USER_DEV}:${DB_PASSWORD_DEV}@db-dev:5432/ambulance_app_db
      AUTH_SECRET: ${AUTH_SECRET_DEV}
      NEXTAUTH_URL: https://dev.vdf-ambulance.fr
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST}
      EMAIL_SERVER_HOST: ${EMAIL_SERVER_HOST}
      EMAIL_SERVER_PORT: ${EMAIL_SERVER_PORT}
      EMAIL_SERVER_USER: ${EMAIL_SERVER_USER}
      EMAIL_SERVER_PASSWORD: ${EMAIL_SERVER_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_ADMIN_NOTIFY: ${EMAIL_ADMIN_NOTIFY}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      - db-dev
    networks:
      - vdf-network-dev

  # Automatisation n8n
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: vdf-n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=n8n.vdf-ambulance.fr
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=development
      - WEBHOOK_URL=https://n8n.vdf-ambulance.fr/
      # DB connexion (utilise la même BDD que l'app !)
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=ambulance_app_db
      - DB_POSTGRESDB_HOST=db-dev
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=${DB_USER_DEV}
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD_DEV}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - vdf-network-dev
    depends_on:
      - db-dev

  # WAHA - WhatsApp HTTP API (alternative robuste)
  waha:
    image: devlikeapro/waha
    container_name: vdf-waha
    restart: always
    ports:
      - "8081:3000"
    environment:
      - WHATSAPP_DEFAULT_ENGINE=WEBJS
      - WAHA_PRINT_QR=True
      - WAHA_API_KEY=vdf-waha-secret-2026
    volumes:
      - waha_sessions:/app/.sessions
    networks:
      - vdf-network-dev

networks:
  vdf-network-dev:
    driver: bridge

volumes:
  postgres_data_dev:
  n8n_data:
  waha_sessions:
