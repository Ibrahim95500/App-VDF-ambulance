version: '3.8'

services:
  # Base de données de Développement
  db-dev:
    image: postgres:15
    container_name: vdf-db-dev
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER_DEV}
      POSTGRES_PASSWORD: ${DB_PASSWORD_DEV}
      POSTGRES_DB: ambulance_db_dev
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - vdf-network-dev

  # Application Next.js de Développement
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vdf-app-dev
    restart: always
    ports:
      - "8080:3000"
    environment:
      DATABASE_URL: postgresql://${DB_USER_DEV}:${DB_PASSWORD_DEV}@db-dev:5432/ambulance_db_dev
      AUTH_SECRET: ${AUTH_SECRET_DEV}
      NEXTAUTH_URL: https://dev.vdf-ambulance.fr
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST}
      EMAIL_SERVER_HOST: ${EMAIL_SERVER_HOST}
      EMAIL_SERVER_PORT: ${EMAIL_SERVER_PORT}
      EMAIL_SERVER_USER: ${EMAIL_SERVER_USER}
      EMAIL_SERVER_PASSWORD: ${EMAIL_SERVER_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_ADMIN_NOTIFY: ${EMAIL_ADMIN_NOTIFY}
    depends_on:
      - db-dev
    networks:
      - vdf-network-dev

  # Automatisation n8n
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: vdf-n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=n8n.vdf-ambulance.fr
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=development
      - WEBHOOK_URL=https://n8n.vdf-ambulance.fr/
      # DB connexion (utilise la même BDD que l'app !)
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=ambulance_db_dev
      - DB_POSTGRESDB_HOST=db-dev
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=${DB_USER_DEV}
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD_DEV}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - vdf-network-dev
    depends_on:
      - db-dev

  # Evolution API (WhatsApp Alternative)
  evolution-api:
    image: atendai/evolution-api:v2.1.1
    container_name: vdf-evolution-api
    restart: always
    ports:
      - "8081:8080"
    environment:
      - SERVER_URL=http://localhost:8081
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${AUTH_SECRET_DEV:-vdf_securite_api_2024}
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${DB_USER_DEV}:${DB_PASSWORD_DEV}@db-dev:5432/ambulance_db_dev?schema=evolution
    volumes:
      - evolution_instances_dev:/evolution/instances
      - evolution_store_dev:/evolution/store
    depends_on:
      - db-dev
    networks:
      - vdf-network-dev

networks:
  vdf-network-dev:
    driver: bridge

volumes:
  postgres_data_dev:
  n8n_data:
  evolution_instances_dev:
  evolution_store_dev:
